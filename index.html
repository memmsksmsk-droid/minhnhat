<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>TRẦN BÁCH Login 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

        body{
            min-height:100vh;
            background:linear-gradient(to top,#0f2027,#203a43,#2c5364);
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            position:relative;
            padding-top:60px;
            overflow-x:hidden;
        }

        /* ===== TOP BANNER ===== */
        .top-banner{
            position:fixed;
            top:0;left:0;
            width:100%;
            height:55px;
            background:rgba(10,15,25,0.6);
            backdrop-filter:blur(15px);
            display:flex;
            align-items:center;
            overflow:hidden;
            z-index:40;
            border-bottom:1px solid rgba(255,255,255,0.1);
        }

        .banner-text{
            position:absolute;
            white-space:nowrap;
            font-weight:bold;
            font-size:18px;
            animation:scrollText 18s linear infinite;
            color:#00f2ff;
            text-shadow:0 0 12px #00f2ff;
        }

        @keyframes scrollText{
            0%{left:100%;}
            100%{left:-100%;}
        }

        /* ===== RAIN ===== */
        .rain{
            position:absolute;
            width:100%;
            height:100%;
            pointer-events:none;
        }

        .drop{
            position:absolute;
            bottom:100%;
            width:2px;
            height:20px;
            background:rgba(255,255,255,0.4);
            animation:fall linear infinite;
        }

        @keyframes fall{
            to{transform:translateY(120vh);}
        }

        /* ===== AUTH BOX ===== */
        .container-auth{
            position:relative;
            z-index:5;
            width:100%;
            display:flex;
            justify-content:center;
            padding:20px;
        }

        .auth-box{
            width:100%;
            max-width:400px;
            padding:35px;
            border-radius:25px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(18px);
            box-shadow:0 0 40px rgba(0,0,0,0.6);
        }

        .form-control{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.25);
            box-shadow:0 0 12px #00f2ff;
            color:white;
        }

        .btn-main{
            width:100%;
            margin-top:15px;
            border-radius:50px;
            background:linear-gradient(45deg,#00f2ff,#4facfe);
            border:none;
            font-weight:bold;
        }

        .switch{
            margin-top:15px;
            text-align:center;
            cursor:pointer;
            color:#00f2ff;
        }

        .hidden{display:none;}

        .footer{
            position:absolute;
            bottom:10px;
            width:100%;
            text-align:center;
            font-size:14px;
            opacity:0.7;
        }

        #msg{text-align:center;margin-top:10px;font-weight:bold;}

        /* MOBILE */
        @media (max-width:768px){
            .banner-text{font-size:14px;}
            .auth-box{padding:25px;}
        }
    </style>
</head>
<body>

<div class="top-banner">
    <div class="banner-text">
        👑 Chào mừng bạn đến hệ thống của Admin Trần Bách 2026 👑
    </div>
</div>

<div class="rain" id="rain"></div>

<div class="container-auth">
    <div class="auth-box">
        <h3 id="title" class="text-center mb-4">ĐĂNG NHẬP</h3>

        <div id="loginForm">
            <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
            <input type="password" id="loginPass" class="form-control mb-2" placeholder="Mật khẩu">
            <button class="btn btn-main" onclick="login()">Đăng Nhập</button>
            <div class="switch" onclick="showRegister()">Chưa có tài khoản? Đăng ký</div>
        </div>

        <div id="registerForm" class="hidden">
            <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email">
            <input type="password" id="regPass" class="form-control mb-2" placeholder="Mật khẩu">
            <button class="btn btn-main" onclick="register()">Đăng Ký</button>
            <div class="switch" onclick="showLogin()">Đã có tài khoản? Đăng nhập</div>
        </div>

        <div id="msg"></div>
    </div>
</div>

<div class="footer">© 2026 Trần Bách</div>

<script>
    /* ===== RAIN EFFECT (Giữ nguyên) ===== */
    const rainContainer = document.getElementById("rain");
    for(let i=0;i<120;i++){
        let drop=document.createElement("div");
        drop.className="drop";
        drop.style.left=Math.random()*100+"%";
        drop.style.animationDuration=(0.6+Math.random())+"s";
        rainContainer.appendChild(drop);
    }

    /* ===== AUTO LOGIN (Sửa nhẹ để ổn định hơn) ===== */
    let currentUser=JSON.parse(localStorage.getItem("currentUser"));
    if(currentUser){
        // window.location.href = (currentUser.role === "admin") ? "admin.html" : "home.html";
    }

    /* ===== SWITCH FORM (Giữ nguyên) ===== */
    function showRegister(){
        loginForm.classList.add("hidden");
        registerForm.classList.remove("hidden");
        title.innerText="ĐĂNG KÝ";
        msg.innerText="";
    }

    function showLogin(){
        registerForm.classList.add("hidden");
        loginForm.classList.remove("hidden");
        title.innerText="ĐĂNG NHẬP";
        msg.innerText="";
    }

    /* ===== ENCODE PASSWORD (Giữ nguyên) ===== */
    function encodePass(p){return btoa(p);}

    /* ===== REGISTER (Sửa logic lưu trữ) ===== */
    function register(){
        let email = regEmail.value.trim();
        let pass = regPass.value.trim();
        
        // Luôn đọc dữ liệu mới nhất từ localStorage trước khi thêm
        let users = JSON.parse(localStorage.getItem("users")) || [];

        if(!email || !pass){
            msg.style.color="red";
            msg.innerText="Nhập đầy đủ thông tin!";
            return;
        }

        if(users.find(u => u.email === email)){
            msg.style.color="red";
            msg.innerText="Email đã tồn tại!";
            return;
        }

        let newUser = {
            email: email,
            pass: encodePass(pass),
            role: "customer",
            date: new Date().toLocaleString('vi-VN')
        };

        users.push(newUser);
        // Lưu lại mảng users vào localStorage
        localStorage.setItem("users", JSON.stringify(users));

        msg.style.color="#00f2ff";
        msg.innerText="Đăng ký thành công!";
        setTimeout(showLogin, 1000);
    }

    // Ví dụ logic lúc lưu user mới vào mảng users
let newUser = {
    name: "bach", // Lấy từ input tên đăng ký của bạn
    email: emailDangKy,
    pass: passDaMaHoa,
    balance: 0 // Khởi tạo số dư bằng 0
};
users.push(newUser);
localStorage.setItem("users", JSON.stringify(users));
    /* ===== LOGIN (Sửa logic kiểm tra) ===== */
    function login(){
        let email = loginEmail.value.trim();
        let passRaw = loginPass.value.trim();
        let passEncoded = encodePass(passRaw);
        
        // Đọc danh sách users từ localStorage
        let users = JSON.parse(localStorage.getItem("users")) || [];

        // Kiểm tra Admin
        if(email === "admin@bach.com" && passRaw === "123456"){
            localStorage.setItem("currentUser", JSON.stringify({email: email, role: "admin"}));
            window.location.href="admin.html";
            return;
        }

        // Tìm user trong mảng vừa đọc
        let found = users.find(u => u.email === email && u.pass === passEncoded);

        if(found){
            localStorage.setItem("currentUser", JSON.stringify(found));
            localStorage.setItem("rememberEmail", email);
            msg.style.color="#00f2ff";
            msg.innerText="Đang đăng nhập...";
            setTimeout(() => { window.location.href="home.html"; }, 800);
        } else {
            msg.style.color="red";
            msg.innerText="Sai tài khoản hoặc mật khẩu!";
        }
    }

    /* ===== REMEMBER EMAIL (Giữ nguyên) ===== */
    window.onload=function(){
        let remembered=localStorage.getItem("rememberEmail");
        if(remembered){
            loginEmail.value=remembered;
        }
    }
</script>

</body>
</html>
