<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Tra Đơn Hàng | Trần Bách Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Orbitron:wght@500&display=swap');

        :root {
            --bg: #05070a;
            --primary: #818cf8;
            --card: rgba(255, 255, 255, 0.02);
            --text: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Quicksand', sans-serif; /* Font này mềm mại hơn */
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        /* ----- HIỆU ỨNG MƯA ----- */
        .rain-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .drop {
            position: absolute; width: 1px; height: 60px;
            background: linear-gradient(to bottom, transparent, rgba(129, 140, 248, 0.2));
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(100vh); } }

        /* ----- NÚT NHẠC CHILL (ĐĨA THAN) ----- */
        .music-player {
            position: fixed; top: 30px; right: 30px; z-index: 100;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.4); padding: 10px 20px;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .disc {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid var(--primary);
            animation: rotate 3s linear infinite;
            animation-play-state: paused;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-player.playing .disc { animation-play-state: running; }
        .player-text { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--primary); }

        /* ----- GIAO DIỆN ĐƠN HÀNG ----- */
        .container { width: 100%; max-width: 500px; z-index: 1; }
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 22px; 
            letter-spacing: 6px; color: #fff; opacity: 0.8;
        }
        .header p { font-size: 11px; margin-top: 10px; color: var(--primary); opacity: 0.6; }

        .order-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; padding: 25px; margin-bottom: 25px;
            transition: all 0.4s ease;
        }
        .order-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .product-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .client-name { font-size: 12px; opacity: 0.5; }

        .status-badge {
            font-size: 9px; padding: 5px 12px; border-radius: 5px;
            letter-spacing: 1px; font-weight: 700; text-transform: uppercase;
        }
        .st-choduyet { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .st-danggiao { color: var(--primary); background: rgba(129, 140, 248, 0.1); }
        .st-thanhcong { color: #34d399; background: rgba(52, 211, 153, 0.1); }
        .st-huy { color: #f87171; background: rgba(248, 113, 113, 0.1); }

        /* THANH TIẾN TRÌNH MINIMAL */
        .progress-line {
            height: 2px; background: rgba(255,255,255,0.05);
            border-radius: 10px; position: relative; margin: 15px 0;
        }
        .fill {
            height: 100%; background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back {
            display: block; text-align: center; margin-top: 50px;
            color: #475569; text-decoration: none; font-size: 12px;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-back:hover { color: #fff; }

    </style>
</head>
<body>

    <div class="rain-container" id="rain"></div>

    <div class="music-player" id="player" onclick="toggleMusic()">
        <img src="https://cdn-icons-png.flaticon.com/512/3759/3759601.png" class="disc" alt="disc">
        <span class="player-text" id="statusText">BẬT NHẠC CHILL</span>
    </div>
    
    <audio id="lofiTrack" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

    <div class="container">
        <div class="header">
            <h1>Trần Bách Mode</h1>
            <p>KIỂM TRA TRẠNG THÁI ĐƠN HÀNG  • LOFI AMBIENT</p>
        </div>

        <div id="list"></div>

        <a href="home.html" class="btn-back">QUAY LẠI TRANG CHỦ</a>
    </div>

<script>
    // TẠO MƯA NHẸ NHÀNG
    function createRain() {
        const container = document.getElementById('rain');
        for (let i = 0; i < 40; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 1 + 1) + 's'; 
            drop.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(drop);
        }
    }

    // ĐIỀU KHIỂN NHẠC
    const audio = document.getElementById('lofiTrack');
    const player = document.getElementById('player');
    const statusText = document.getElementById('statusText');
    let isPlaying = false;

    function toggleMusic() {
        if (!isPlaying) {
            audio.play().catch(() => alert("Sếp ơi, hãy nhấn lại một lần nữa để khởi động âm thanh nhé!"));
            player.classList.add('playing');
            statusText.innerText = "LOFI RAIN: ON";
        } else {
            audio.pause();
            player.classList.remove('playing');
            statusText.innerText = "LOFI RAIN: OFF";
        }
        isPlaying = !isPlaying;
    }

    // ĐỔ DỮ LIỆU ĐƠN HÀNG
    function loadData() {
        const orders = JSON.parse(localStorage.getItem("orders")) || [];
        const container = document.getElementById("list");

        if (orders.length === 0) {
            container.innerHTML = `<center style="opacity:0.2; padding:100px 0">Chưa có tín hiệu đơn hàng...</center>`;
            return;
        }

        container.innerHTML = [...orders].reverse().map(o => {
            let percent = 15;
            let cls = "st-choduyet";
            if (o.status === "Đang giao") { percent = 60; cls = "st-danggiao"; }
            else if (o.status === "Thành công") { percent = 100; cls = "st-thanhcong"; }
            else if (o.status === "Đã hủy") { percent = 0; cls = "st-huy"; }

            return `
                <div class="order-card">
                    <div class="card-header">
                        <div>
                            <div class="product-name">${o.product}</div>
                            <div class="client-name">Khách hàng: ${o.client}</div>
                        </div>
                        <div><span class="status-badge ${cls}">${o.status}</span></div>
                    </div>
                    <div class="progress-line"><div class="fill" style="width:${percent}%"></div></div>
                    <div style="display:flex; justify-content:space-between; font-size:9px; opacity:0.3; letter-spacing:1px">
                        <span>PHÁT HÀNH</span><span>VẬN CHUYỂN</span><span>HOÀN TẤT</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    createRain();
    loadData();
    setInterval(loadData, 4000);
</script>
</body>
</html>
