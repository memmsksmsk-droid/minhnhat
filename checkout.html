<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - TRAN BACH</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1e293b,#0f172a);
color:white;
overflow:hidden;
}

/* CARD */
.container{
width:420px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 60px rgba(0,150,255,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
}

.input{
margin-bottom:18px;
}

.input label{
font-size:13px;
opacity:0.7;
}

.input input{
width:100%;
padding:12px;
margin-top:5px;
border-radius:12px;
border:none;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
transition:0.3s;
}

.input input:focus{
box-shadow:0 0 15px rgba(0,150,255,0.6);
background:rgba(255,255,255,0.12);
}

/* SHIPPING BUTTONS */
.shipping{
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.ship-btn{
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);
cursor:pointer;
text-align:center;
transition:0.3s;
font-size:14px;
}

.ship-btn:hover{
background:rgba(0,150,255,0.2);
}

.ship-btn.active{
background:linear-gradient(90deg,#00c6ff,#0072ff);
box-shadow:0 0 20px rgba(0,150,255,0.7);
}

/* TOTAL */
.total{
margin-top:20px;
padding:15px;
border-radius:12px;
background:rgba(0,0,0,0.4);
display:flex;
justify-content:space-between;
font-weight:bold;
font-size:16px;
}

/* BUTTON */
button{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(0,150,255,0.8);
}
</style>
</head>

<body>

<div class="container">
<h2>Thanh Toán</h2>

<div class="input">
<label>Họ và tên</label>
<input type="text" id="name">
</div>

<div class="input">
<label>Số điện thoại</label>
<input type="text" id="phone">
</div>

<div class="input">
<label>Địa chỉ</label>
<input type="text" id="address">
</div>

<label style="font-size:13px;opacity:0.7;">Khu vực giao hàng</label>

<div class="shipping">
<div class="ship-btn" onclick="selectShip(this,20000)">TP.HCM<br>20.000đ</div>
<div class="ship-btn" onclick="selectShip(this,30000)">Miền Nam<br>30.000đ</div>
<div class="ship-btn" onclick="selectShip(this,40000)">Miền Trung<br>40.000đ</div>
<div class="ship-btn" onclick="selectShip(this,50000)">Miền Bắc<br>50.000đ</div>
</div>

<div class="total">
<span>Tổng thanh toán</span>
<span id="totalPrice">199.000đ</span>
</div>

<button onclick="confirmOrder()">Xác nhận đơn hàng</button>
</div>

<script>
let basePrice = 199000;
let shipping = 0;

function selectShip(element, price){
shipping = price;

/* bỏ active cũ */
document.querySelectorAll(".ship-btn").forEach(btn=>{
btn.classList.remove("active");
});

/* thêm active mới */
element.classList.add("active");

updateTotal();
}

function updateTotal(){
let total = basePrice + shipping;
document.getElementById("totalPrice").innerText =
total.toLocaleString() + "đ";
}

function confirmOrder(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(name==""||phone==""||address==""||shipping==0){
alert("Vui lòng nhập đầy đủ thông tin và chọn khu vực!");
return;
}

localStorage.setItem("name",name);
localStorage.setItem("phone",phone);
localStorage.setItem("address",address);
localStorage.setItem("total",basePrice+shipping);

window.location.href="payment.html";
}
</script>
<script>

const product = JSON.parse(localStorage.getItem("currentProduct"));

if(product){

const div = document.createElement("div");
div.style.marginBottom = "20px";

div.innerHTML = `
<h3>Sản phẩm: ${product.name}</h3>
<p>Giá: ${product.price}</p>
`;

document.querySelector(".container").prepend(div);

}

</script>

</body>
</html>
