<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán QR - TRAN BACH</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{ min-height:100vh; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); display:flex; justify-content:center; align-items:center; color:white; overflow:hidden; }
        canvas{ position:fixed; top:0; left:0; z-index:-1; }
        .container{ width:450px; background:rgba(255,255,255,0.08); backdrop-filter:blur(15px); padding:30px; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
        h2{ text-align:center; margin-bottom:15px; color: #00c6ff; }
        .amount{ text-align:center; font-size:24px; font-weight:600; margin:10px 0; color:#00ffd5; text-shadow: 0 0 10px rgba(0,255,213,0.5); }
        .note{ text-align:center; font-size:15px; margin-bottom:15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .qr{ text-align:center; margin:15px 0; }
        .qr img{ width:220px; border-radius:15px; border: 3px solid rgba(255,255,255,0.1); }
        input{ width:100%; padding:12px; margin:8px 0; border:none; border-radius:12px; background:rgba(255,255,255,0.15); color:white; outline:none; }
        button{ width:100%; padding:14px; margin-top:12px; border:none; border-radius:25px; background:linear-gradient(45deg,#00c6ff,#0072ff); color:white; font-weight:600; cursor:pointer; transition: 0.3s; }
        button:hover{ box-shadow:0 0 20px #00c6ff; transform: scale(1.02); }
    </style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="container">
    <h2>🌧 Thanh toán đơn hàng</h2>
    

    <div class="qr">
        <img src="photo_2026-03-22_15-28-48.jpg" alt="QR Thanh Toán">
    </div>

    <input type="text" id="payerName" placeholder="Tên người chuyển khoản (Vd: Nguyễn Văn A)">
    <input type="text" id="bankName" placeholder="Ngân hàng chuyển (Vd: MB Bank, Vietcombank)">
    
    <button onclick="confirmPayment()">Tôi đã thanh toán</button>
</div>

<script>
    // 1. Lấy dữ liệu từ home.html truyền sang
    const product = JSON.parse(localStorage.getItem("currentProduct"));

    if(product) {
        document.getElementById("displayAmount").innerText = "Số tiền: " + product.price;
        document.getElementById("displayNote").innerText = "Nội dung: " + product.name;
    } else {
        alert("Không tìm thấy thông tin sản phẩm!");
        window.location.href = "home.html";
    }

    // 2. Xử lý khi bấm xác nhận
    function confirmPayment() {
        const payer = document.getElementById("payerName").value.trim();
        const bank = document.getElementById("bankName").value.trim();

        if(!payer || !bank) {
            alert("Vui lòng nhập tên và ngân hàng!");
            return;
        }

        // Lưu thông tin người mua vào object sản phẩm
        product.payerName = payer;
        product.bankName = bank;
        product.date = new Date().toLocaleString('vi-VN');
        
        localStorage.setItem("currentProduct", JSON.stringify(product));
        
        alert("Thông tin đã gửi! Đang tạo hóa đơn...");
        window.location.href = "success.html";
    }

    /* Hiệu ứng mưa */
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let drops=[];
    for(let i=0;i<150;i++){ drops.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,l:15,s:5}); }
    function rain(){
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.strokeStyle="rgba(255,255,255,0.2)";
        drops.forEach(d=>{ ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-2,d.y+d.l); ctx.stroke(); d.y+=d.s; if(d.y>canvas.height)d.y=0; });
        requestAnimationFrame(rain);
    }
    rain();
</script>
</body>
</html>
